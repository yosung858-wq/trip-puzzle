<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧩 旅行拼图</title>
    <style>
        :root { --bg: #f5f3f0; --surface: #fffdf9; --accent: #e8784a; --text: #3d3226; }
        body { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); margin:0; }
        .header { padding:10px; background:var(--surface); border-bottom:1px solid #ddd; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
        .btn { padding:8px 14px; border-radius:20px; border:1px solid #ccc; background:#fff; cursor:pointer; font-weight:600; }
        .btn-primary { background:var(--accent); color:#fff; border:none; }
        .toast { position:fixed; top:15px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:8px 20px; border-radius:20px; z-index:999; display:none; }
        .panel { display:flex; flex-direction:column; padding:12px; }
        textarea, input, select { width:100%; padding:8px; margin:4px 0; border:1px solid #ddd; border-radius:8px; }
    </style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="header">
    <strong>🧩 旅行拼图</strong>
    <button class="btn" onclick="createRoom()">✨ 创建房间</button>
    <button class="btn" onclick="joinRoom()">🔗 加入房间</button>
    <button class="btn" onclick="exportRoom()">📤 导出</button>
    <button class="btn" onclick="document.getElementById('importFile').click()">📥 导入</button>
    <span id="roomInfo"></span>
</div>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="importRoom(event)">

<div style="display:flex; flex-wrap:wrap;">
    <div class="panel" style="flex:1; min-width:300px;">
        <h3>📝 内容收集</h3>
        <input id="userName" placeholder="你的名字" value="小明">
        <input id="userCity" placeholder="出发城市" value="北京">
        <select id="platform"><option>小红书</option><option>抖音</option></select>
        <textarea id="contentText" rows="3" placeholder="粘贴攻略..."></textarea>
        <button class="btn btn-primary" onclick="submitContent()">🤖 AI提取地点</button>
        <div id="contents"></div>
    </div>
    <div class="panel" style="flex:1; min-width:300px;">
        <h3>📍 地点聚合</h3>
        <div id="places"></div>
    </div>
    <div class="panel" style="flex:1; min-width:300px;">
        <h3>🗓️ 行程</h3>
        <input type="date" id="startDate"> 天数: <select id="days"><option>2</option><option>3</option></select>
        <button class="btn btn-primary" onclick="generatePlan()">生成行程</button>
        <div id="plan"></div>
    </div>
</div>

<script>
// 全局状态
let data = { room: null, user: '小明', city: '北京' };

// 辅助函数
function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2000);
}

// AI 提取（模拟）
function extract(text) {
    const known = [
        { kw:['故宫'], name:'故宫', type:'景点' },
        { kw:['烤鸭','四季民福'], name:'四季民福烤鸭店', type:'餐厅' },
        { kw:['花间堂'], name:'花间堂酒店', type:'住宿' },
        { kw:['长城','八达岭'], name:'八达岭长城', type:'景点' },
        { kw:['南锣鼓巷'], name:'南锣鼓巷', type:'景点' },
    ];
    const result = [];
    known.forEach(p => {
        if (p.kw.some(w => text.includes(w)) && !result.find(r => r.name === p.name)) {
            result.push({ name: p.name, type: p.type });
        }
    });
    return result;
}

// 创建房间
function createRoom() {
    const code = Math.random().toString(36).substring(2,8).toUpperCase();
    data.room = { code, contents:[], selected:[], itinerary:null };
    localStorage.setItem('room_'+code, JSON.stringify(data.room));
    document.getElementById('roomInfo').textContent = '房间码: ' + code;
    renderAll();
    toast('房间创建成功！分享码：' + code);
}

// 加入房间
function joinRoom() {
    const code = prompt('请输入分享码:');
    if(!code) return;
    const saved = localStorage.getItem('room_'+code);
    if(saved) {
        data.room = JSON.parse(saved);
        document.getElementById('roomInfo').textContent = '已加入: ' + code;
        renderAll();
        toast('加入成功');
    } else {
        toast('房间不存在');
    }
}

// 提交内容
function submitContent() {
    if(!data.room) return toast('请先创建或加入房间');
    const text = document.getElementById('contentText').value.trim();
    if(!text) return;
    const places = extract(text);
    data.room.contents.push({
        user: data.user,
        platform: document.getElementById('platform').value,
        text,
        places
    });
    localStorage.setItem('room_'+data.room.code, JSON.stringify(data.room));
    document.getElementById('contentText').value = '';
    renderAll();
}

// 切换地点选中状态
function togglePlace(name) {
    if(!data.room) return;
    if (!data.room.selected) data.room.selected = [];
    const idx = data.room.selected.indexOf(name);
    if(idx >= 0) data.room.selected.splice(idx,1);
    else data.room.selected.push(name);
    localStorage.setItem('room_'+data.room.code, JSON.stringify(data.room));
    renderAll();
}

// 生成行程
function generatePlan() {
    if(!data.room) return toast('请先创建房间');
    if(!data.room.selected || data.room.selected.length === 0) return toast('请先在地点聚合中点击加入行程');
    const days = parseInt(document.getElementById('days').value) || 2;
    const plan = [];
    for(let i=0;i<days;i++) plan.push({day:i+1, places:[]});
    data.room.selected.forEach((name,i) => {
        plan[i%days].places.push(name);
    });
    data.room.itinerary = plan;
    localStorage.setItem('room_'+data.room.code, JSON.stringify(data.room));
    renderAll();
}

// 导出房间
function exportRoom() {
    if(!data.room) return;
    const blob = new Blob([JSON.stringify(data.room, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '旅行拼图_' + data.room.code + '.json';
    a.click();
    toast('已导出');
}

// 导入房间
function importRoom(e) {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
        try {
            data.room = JSON.parse(ev.target.result);
            document.getElementById('roomInfo').textContent = '已导入: ' + data.room.code;
            renderAll();
            toast('导入成功');
        } catch(ex) {
            toast('文件格式错误');
        }
    };
    reader.readAsText(file);
}

// 渲染所有面板
function renderAll() {
    if(!data.room) return;
    // 内容列表
    document.getElementById('contents').innerHTML = data.room.contents.map(c => 
        `<div style="margin:4px 0; padding:6px; background:#fff; border-radius:6px;">
            <strong>${c.user}</strong> (${c.platform}): ${c.text}
            <div>${c.places.map(p => `<span style="background:#eee; padding:2px 6px; border-radius:4px; font-size:0.8em;">${p.name}</span>`).join(' ')}</div>
        </div>`
    ).join('');

    // 地点聚合
    const stats = {};
    data.room.contents.forEach(c => {
        c.places.forEach(p => {
            if(!stats[p.name]) stats[p.name] = { ...p, count:0, users:new Set() };
            stats[p.name].count++;
            stats[p.name].users.add(c.user);
        });
    });
    document.getElementById('places').innerHTML = Object.values(stats).map(p => {
        const isSel = data.room.selected && data.room.selected.includes(p.name);
        return `<div onclick="togglePlace('${p.name}')" style="cursor:pointer; background:${isSel?'#ffe0cc':'#fff'}; padding:6px; margin:4px 0; border-radius:6px; border:1px solid #ddd;">
            <strong>${p.name}</strong> (${p.type}) · ${p.count}人推荐
            <span style="color:gray; font-size:0.8em;">${[...p.users].join(', ')}</span>
            ${isSel ? ' ✅' : ''}
        </div>`;
    }).join('');

    // 行程
    const planDiv = document.getElementById('plan');
    if(data.room.itinerary) {
        planDiv.innerHTML = data.room.itinerary.map(d => `
            <div style="background:#fff; padding:8px; margin:4px 0; border-radius:6px;">
                <strong>第${d.day}天</strong>: ${d.places.join(' → ')}
            </div>
        `).join('');
    } else {
        planDiv.innerHTML = '<div style="color:gray;">点击生成行程</div>';
    }
}

// 初始化
window.onload = function() {
    toast('旅行拼图已就绪，点击"创建房间"开始吧');
};
</script>
</body>
</html>
