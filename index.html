<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧩 旅行拼图 · 在线协作</title>
    <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f3f0; --surface: #fffdf9; --border: #e8e0d5; --text: #3d3226;
            --accent: #e8784a; --gold: #c9a65b; --radius: 12px;
            --font: 'LXGW WenKai', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); }
        .app-header {
            background: var(--surface); border-bottom:1px solid var(--border);
            padding:10px 15px; display:flex; align-items:center; justify-content:space-between;
            flex-wrap:wrap; gap:8px; position:sticky; top:0; z-index:100;
        }
        .main-container { display: flex; height: calc(100vh - 56px); overflow-x: auto; scroll-snap-type: x mandatory; }
        .panel {
            min-width: 100%; max-width: 100%; flex: none;
            border-right: 1px solid var(--border); background: var(--surface);
            display: flex; flex-direction: column; scroll-snap-align: start;
        }
        @media (min-width: 768px) { .panel { min-width: 33.33%; max-width: 33.33%; } }
        .panel-header { padding:12px; font-weight:700; background:#fefaf5; border-bottom:1px solid var(--border); }
        .panel-body { flex:1; overflow-y:auto; padding:10px; }
        .btn {
            padding:8px 14px; border-radius:20px; border:none; cursor:pointer;
            font-weight:600; font-size:0.85em; font-family: var(--font);
            background: transparent; border:2px solid var(--border); color: var(--text);
            white-space: nowrap; transition:0.2s;
        }
        .btn-primary { background: var(--accent); color:#fff; border-color: var(--accent); }
        .btn-sm { padding:5px 10px; font-size:0.75em; }
        .toast {
            position:fixed; top:15px; left:50%; transform:translateX(-50%);
            background: #3d3226; color:#fff; padding:10px 20px; border-radius:20px;
            z-index:999; opacity:0; transition:0.3s; font-size:0.9em;
        }
        .toast.show { opacity:1; }
        input, textarea, select {
            font-family: var(--font); border:1.5px solid var(--border);
            border-radius:8px; padding:8px; font-size:0.9em; width:100%;
            background: var(--surface); margin:4px 0;
        }
        .place-card {
            background: #fff; border:1px solid var(--border); border-radius: var(--radius);
            padding:8px; margin-bottom:6px; cursor:pointer; font-size:0.9em;
        }
        .place-card.high-freq { border-left:4px solid var(--gold); }
        .day-block { background: #fefaf5; border-radius: var(--radius); padding:10px; margin-bottom:8px; }
        .modal-overlay {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.4); z-index:200; display:flex;
            align-items:center; justify-content:center;
        }
        .modal {
            background:#fff; border-radius:var(--radius); padding:24px;
            max-width:400px; width:90%; max-height:80vh; overflow-y:auto;
        }
        .filter-btn.active { background: var(--accent); color:#fff; border-color: var(--accent); }
        .image-upload-area {
            border:2px dashed var(--border); border-radius:8px; padding:20px;
            text-align:center; cursor:pointer; background:#fafaf7; margin-top:4px;
        }
        .image-upload-area:hover { border-color: var(--accent); background:#fff7f2; }
        .preview-img { max-width:100%; max-height:150px; border-radius:6px; margin-top:8px; display:none; }
    </style>
</head>
<body>
<div class="toast" id="toast"></div>
<header class="app-header">
    <div style="font-size:1.4em; font-weight:700; color:var(--accent);">🧩 旅行拼图</div>
    <div style="display:flex; gap:6px; align-items:center; flex-wrap:wrap;">
        <button class="btn btn-sm" onclick="showAISettings()">🤖 自定义AI</button>
        <span id="roomCodeDisplay" style="background:#fefaf5; padding:5px 10px; border-radius:14px; font-weight:600; font-family:monospace; cursor:pointer;" onclick="copyShareCode()">—</span>
        <button class="btn btn-sm" onclick="showCreateModal()">✨ 创建</button>
        <button class="btn btn-sm" onclick="showJoinModal()">🔗 加入</button>
        <button class="btn btn-sm" onclick="finishTrip()">✅ 存档</button>
        <button class="btn btn-sm" onclick="showArchiveModal()">📦 档案馆</button>
        <span id="destinationLabel" style="font-weight:600;"></span>
        <span id="countdownBadge" style="background:#fff0e8; padding:4px 8px; border-radius:10px; display:none;"></span>
        <span id="weatherBadge" style="background:#f0f4f8; padding:4px 8px; border-radius:10px; display:none;"></span>
    </div>
</header>

<div class="main-container">
    <!-- 左栏：内容收集 -->
    <div class="panel" id="panelLeft">
        <div class="panel-header">📝 内容收集</div>
        <div class="panel-body">
            <div style="display:flex; gap:6px; align-items:center;">
                <span>👤</span><strong id="currentUserLabel">我</strong>
                <button class="btn btn-sm" onclick="switchUser()">切换</button>
                <button class="btn btn-sm" onclick="addMember()">+成员</button>
            </div>
            <input type="text" id="userName" placeholder="你的名字" value="小明">
            <input type="text" id="userCity" placeholder="出发城市" value="北京">
            <div style="display:flex; gap:6px; align-items:center;">
                <button class="btn btn-sm" id="toggleModeBtn" onclick="toggleInputMode()" style="flex:1;">📷 截图模式</button>
            </div>
            <div id="textInputGroup"><textarea id="contentText" placeholder="粘贴攻略文字..." rows="4"></textarea></div>
            <div id="imageInputGroup" style="display:none;">
                <div class="image-upload-area" id="imageUploadArea" onclick="document.getElementById('imageInput').click()">
                    📷 点击上传截图 或拖拽到此处
                </div>
                <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
                <img id="imagePreview" class="preview-img" alt="预览">
            </div>
            <button class="btn btn-primary" onclick="submitContent()" style="width:100%;">🤖 AI提取地点</button>
            <div id="extractStatus" style="font-size:0.8em; margin-top:4px;"></div>
            <div id="contentsList" style="margin-top:8px;"></div>
        </div>
    </div>
    <!-- 中栏：地点聚合 -->
    <div class="panel" id="panelMid">
        <div class="panel-header">📍 地点聚合</div>
        <div class="panel-body">
            <div style="display:flex; gap:4px; margin-bottom:8px;">
                <button class="btn btn-sm filter-btn active" onclick="setFilter('all')">全部</button>
                <button class="btn btn-sm filter-btn" onclick="setFilter('restaurant')">🍽️ 餐厅</button>
                <button class="btn btn-sm filter-btn" onclick="setFilter('attraction')">🏛️ 景点</button>
                <button class="btn btn-sm filter-btn" onclick="setFilter('accommodation')">🏨 住宿</button>
            </div>
            <div id="highFreqSection" style="display:none;"><strong>🔥 高频推荐</strong><div id="highFreqList"></div></div>
            <div><strong>📋 全部地点</strong><div id="allPlacesList"></div></div>
        </div>
    </div>
    <!-- 右栏：行程计划 -->
    <div class="panel" id="panelRight">
        <div class="panel-header">🗓️ 行程 & 后记</div>
        <div class="panel-body">
            <div style="display:flex; gap:6px; align-items:center;">
                <label>日期</label><input type="date" id="startDate" onchange="updateCountdown()" style="width:auto;">
                <label>天数</label><select id="daysSelect" onchange="updateCountdown()" style="width:auto;">
                    <option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="generateItinerary()" style="width:100%;">✨ 生成行程</button>
            <div id="itineraryDisplay" style="margin-top:8px;"></div>
        </div>
    </div>
</div>
<div style="display:flex; gap:4px; justify-content:center; padding:6px; background:var(--surface);">
    <button class="btn btn-sm" onclick="document.getElementById('panelLeft').scrollIntoView({behavior:'smooth'})">📝 收集</button>
    <button class="btn btn-sm" onclick="document.getElementById('panelMid').scrollIntoView({behavior:'smooth'})">📍 地点</button>
    <button class="btn btn-sm" onclick="document.getElementById('panelRight').scrollIntoView({behavior:'smooth'})">🗓️ 行程</button>
</div>

<!-- 弹窗们 -->
<div class="modal-overlay" id="createModal" style="display:none;"><div class="modal"><h3>创建房间</h3><input id="roomName" placeholder="房间名称"><input id="destCity" placeholder="目的地城市（选填）"><button class="btn btn-primary" onclick="createRoom()">创建</button><button class="btn" onclick="closeModal('createModal')">取消</button></div></div>
<div class="modal-overlay" id="joinModal" style="display:none;"><div class="modal"><h3>加入房间</h3><input id="joinCode" placeholder="分享码"><button class="btn btn-primary" onclick="joinRoom()">加入</button><button class="btn" onclick="closeModal('joinModal')">取消</button></div></div>
<div class="modal-overlay" id="archiveModal" style="display:none;"><div class="modal"><h3>📦 档案馆</h3><div id="archiveList"></div><button class="btn" onclick="closeModal('archiveModal')">关闭</button></div></div>
<div class="modal-overlay" id="aiSettingsModal" style="display:none;"><div class="modal"><h3>🤖 自定义AI接口</h3><p style="font-size:0.8em;">支持豆包、DeepSeek、OpenAI 等兼容接口</p><input id="aiApiKey" placeholder="API Key (ark-... 或 sk-...)" type="password"><input id="aiBaseUrl" placeholder="接口地址 (如 https://ark.cn-beijing.volces.com/api/v3)"><input id="aiModel" placeholder="模型名称 (如 ep-xxxx 或 deepseek-chat)"><button class="btn btn-primary" onclick="saveAISettings()">保存</button><button class="btn" onclick="closeModal('aiSettingsModal')">取消</button></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ========== Supabase 配置（如果需要在线协作，请替换为自己的信息） ==========
const SUPABASE_URL = 'https://你的项目ID.supabase.co';   // 留空则仅本地存储
const SUPABASE_KEY = '你的anon key';
let supabase = null;
if (SUPABASE_URL.includes('supabase')) { try { supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch(e) {} }

// ========== 全局状态 ==========
let appData = {
    activeRoomCode: null,
    activeUserId: 'user_1',
    users: { 'user_1': { name:'小明', city:'北京' } },
    nextUserId: 2,
    rooms: {},
    archives: {},
    ai: { apiKey:'', baseUrl:'', model:'' }
};
let currentFilter = 'all';
let inputMode = 'text';

// 加载本地存储
function loadAll() {
    const saved = localStorage.getItem('trip_puzzle');
    if (saved) { try { appData = { ...appData, ...JSON.parse(saved) }; } catch(e) {} }
    const code = new URLSearchParams(window.location.search).get('code');
    if (code && appData.rooms[code]) appData.activeRoomCode = code;
    const ai = localStorage.getItem('trip_ai');
    if (ai) { try { appData.ai = { ...appData.ai, ...JSON.parse(ai) }; } catch(e) {} }
}
function saveLocal() { localStorage.setItem('trip_puzzle', JSON.stringify(appData)); }
function saveAi() { localStorage.setItem('trip_ai', JSON.stringify(appData.ai)); }

// ========== 实时同步 ==========
async function syncRoom(room) { if (supabase) await supabase.from('rooms').upsert({ share_code: room.shareCode, data: room, updated_at: new Date() }); }
async function subscribeRoom(code) {
    if (!supabase) return;
    supabase.channel(`room:${code}`).on('postgres_changes', { event:'*', schema:'public', table:'rooms', filter:`share_code=eq.${code}` }, payload => {
        if (payload.new && payload.new.data) {
            appData.rooms[code] = payload.new.data;
            saveLocal();
            if (appData.activeRoomCode === code) refreshAll();
        }
    }).subscribe();
}

// ========== 房间操作 ==========
async function createRoom() {
    const name = document.getElementById('roomName').value.trim();
    if (!name) return toast('请输入房间名称');
    const dest = document.getElementById('destCity').value.trim();
    const code = Math.random().toString(36).substring(2,8).toUpperCase();
    const room = { shareCode: code, name, destination: dest || '', startDate:'', days:2, contents:[], itinerary:[], memberCities: { [appData.activeUserId]: getUser().city || '北京' } };
    appData.rooms[code] = room;
    appData.activeRoomCode = code;
    saveLocal();
    if (supabase) await syncRoom(room);
    subscribeRoom(code);
    closeModal('createModal');
    refreshAll();
    toast('房间创建成功！分享码：'+code);
}
async function joinRoom() {
    const code = document.getElementById('joinCode').value.trim().toUpperCase();
    if (!appData.rooms[code]) {
        if (supabase) {
            const { data } = await supabase.from('rooms').select('data').eq('share_code', code).single();
            if (data) appData.rooms[code] = data.data;
            else return toast('房间不存在');
        } else return toast('房间不存在');
    }
    appData.activeRoomCode = code;
    saveLocal();
    subscribeRoom(code);
    closeModal('joinModal');
    refreshAll();
    toast('已加入房间');
}
function finishTrip() {
    const room = getRoom(); if (!room) return;
    room.completed = true;
    appData.archives[room.shareCode] = JSON.parse(JSON.stringify(room));
    delete appData.rooms[room.shareCode];
    appData.activeRoomCode = null;
    saveLocal();
    if (supabase) supabase.from('rooms').delete().eq('share_code', room.shareCode);
    refreshAll();
    toast('旅行已存档');
}
function getRoom() { return appData.activeRoomCode ? appData.rooms[appData.activeRoomCode] : null; }
function getUser() { return appData.users[appData.activeUserId]; }

// ========== 成员管理 ==========
function switchUser() { const ids = Object.keys(appData.users); const cur = ids.indexOf(appData.activeUserId); appData.activeUserId = ids[(cur+1)%ids.length]; refreshAll(); }
function addMember() {
    const name = document.getElementById('userName').value.trim() || '成员'+appData.nextUserId;
    const city = document.getElementById('userCity').value.trim() || '未知';
    const id = 'user_'+appData.nextUserId++;
    appData.users[id] = { name, city };
    appData.activeUserId = id;
    const room = getRoom();
    if (room) { room.memberCities[id] = city; saveLocal(); if (supabase) syncRoom(room); }
    refreshAll(); toast('已添加'+name);
}

// ========== 截图切换 ==========
function toggleInputMode() { /* 同上不变 */ }
function handleImageUpload(e) { /* 同上不变 */ }

// ========== AI 提取（通用接口） ==========
async function extractWithAI(text) {
    const { apiKey, baseUrl, model } = appData.ai;
    if (!apiKey || !baseUrl || !model) return null;
    try {
        const resp = await fetch(`${baseUrl.replace(/\/+$/, '')}/chat/completions`, {
            method:'POST', headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${apiKey}` },
            body: JSON.stringify({ model, messages: [{ role:'user', content: `从以下旅行内容提取餐厅、景点、住宿，返回JSON数组，每个元素{name,type,reason}。只返回JSON数组。\n内容：${text}` }], temperature:0.2 })
        });
        const data = await resp.json();
        const content = data.choices[0].message.content;
        const match = content.match(/\[.*\]/s);
        return match ? JSON.parse(match[0]) : null;
    } catch(e) { return null; }
}
function simulateExtract(text) { /* 保留基本关键词 */ }

async function submitContent() {
    const room = getRoom(); if (!room) return toast('请先创建或加入房间');
    const user = getUser();
    user.name = document.getElementById('userName').value.trim() || user.name;
    user.city = document.getElementById('userCity').value.trim() || user.city;
    if (!room.memberCities) room.memberCities = {};
    room.memberCities[appData.activeUserId] = user.city;
    let rawText = (inputMode==='text') ? document.getElementById('contentText').value.trim() : '[截图内容]';
    if (!rawText && inputMode==='text') return toast('请粘贴攻略文字');
    document.getElementById('extractStatus').textContent = '🤖 AI 分析中...';
    let places = await extractWithAI(rawText);
    if (!places) places = simulateExtract(rawText);
    room.contents.push({ id: Date.now().toString(), userId: appData.activeUserId, userName: user.name, text: rawText.substring(0,200), places, time: new Date().toISOString() });
    if (inputMode==='text') document.getElementById('contentText').value = '';
    else { document.getElementById('imagePreview').style.display = 'none'; document.getElementById('imageInput').value = ''; }
    saveLocal(); if (supabase) syncRoom(room);
    refreshAll();
    document.getElementById('extractStatus').textContent = `✅ 提取到 ${places.length} 个地点`;
    setTimeout(() => document.getElementById('extractStatus').textContent = '', 3000);
}

// ========== 地点聚合与行程 ==========
function aggregatePlaces() { /* 同前 */ }
function setFilter(f) { /* 同前 */ }
function togglePlaceSelect(name) { /* 同前 */ }
function generateItinerary() { /* 同前 */ }

// ========== 天气（安全版） ==========
async function updateWeather() {
    const room = getRoom();
    const badge = document.getElementById('weatherBadge');
    if (!room || !room.destination) { badge.style.display='none'; return; }
    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 5000);
        const resp = await fetch(`https://wttr.in/${encodeURIComponent(room.destination)}?format=4`, { signal: controller.signal });
        clearTimeout(timeout);
        if (!resp.ok) throw new Error('fetch failed');
        let text = await resp.text();
        if (text.includes('<')) {
            const div = document.createElement('div'); div.innerHTML = text;
            text = (div.textContent || div.innerText || '').replace(/\s+/g, ' ').trim();
        } else text = text.replace(/^[:\s]+/, '').trim();
        if (text.length > 60) text = text.substring(0,57)+'...';
        badge.textContent = text;
        badge.style.display = 'inline-block';
    } catch(e) { badge.style.display='none'; }
}
function updateCountdown() { /* 同前 */ }

// ========== AI 设置弹窗 ==========
function showAISettings() {
    document.getElementById('aiApiKey').value = appData.ai.apiKey;
    document.getElementById('aiBaseUrl').value = appData.ai.baseUrl;
    document.getElementById('aiModel').value = appData.ai.model;
    document.getElementById('aiSettingsModal').style.display='flex';
}
function saveAISettings() {
    appData.ai.apiKey = document.getElementById('aiApiKey').value.trim();
    appData.ai.baseUrl = document.getElementById('aiBaseUrl').value.trim();
    appData.ai.model = document.getElementById('aiModel').value.trim();
    saveAi();
    closeModal('aiSettingsModal');
    toast('AI 设置已保存');
}

// ========== 渲染与辅助 ==========
function refreshAll() { renderHeader(); renderLeft(); renderMiddle(); renderRight(); updateWeather(); }
function renderHeader() { /* 同前 */ }
function renderLeft() { /* 同前 */ }
function renderMiddle() { /* 同前 */ }
function renderRight() { /* 同前 */ }
function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
function showCreateModal() { document.getElementById('createModal').style.display='flex'; }
function showJoinModal() { document.getElementById('joinModal').style.display='flex'; }
function showArchiveModal() { /* 同前 */ }
function loadArchive(code) { /* 同前 */ }
function closeModal(id) { document.getElementById(id).style.display='none'; }
function copyShareCode() { const room = getRoom(); if (room) navigator.clipboard.writeText(room.shareCode).then(() => toast('已复制分享码')); }

// 拖拽上传
document.addEventListener('DOMContentLoaded', () => {
    const upload = document.getElementById('imageUploadArea');
    if (upload) {
        upload.addEventListener('dragover', e => { e.preventDefault(); upload.style.borderColor='var(--accent)'; });
        upload.addEventListener('dragleave', () => upload.style.borderColor='var(--border)');
        upload.addEventListener('drop', e => {
            e.preventDefault(); upload.style.borderColor='var(--border)';
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                document.getElementById('imageInput').files = e.dataTransfer.files;
                handleImageUpload({ target: { files: [file] } });
            }
        });
    }
});

// 启动
loadAll();
if (appData.activeRoomCode && appData.rooms[appData.activeRoomCode]) {
    if (supabase) subscribeRoom(appData.activeRoomCode);
    refreshAll();
} else {
    refreshAll();
}
</script>
</body>
</html>
