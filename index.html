<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧩 旅行拼图 · 一起计划旅行吧</title>
    <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f5f3f0; --surface: #fffdf9; --border: #e8e0d5; --text: #3d3226; --accent: #e8784a; --gold: #c9a65b; --radius: 12px; --font: 'LXGW WenKai', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); }
        .app-header { background: var(--surface); border-bottom:1px solid var(--border); padding:10px 15px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; position:sticky; top:0; z-index:100; }
        .main-container { display: flex; height: calc(100vh - 56px); overflow-x: auto; scroll-snap-type: x mandatory; }
        .panel { min-width: 100%; max-width: 100%; flex: none; border-right: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; scroll-snap-align: start; }
        @media (min-width: 768px) { .panel { min-width: 33.33%; max-width: 33.33%; } }
        .panel-header { padding:12px; font-weight:700; background:#fefaf5; border-bottom:1px solid var(--border); }
        .panel-body { flex:1; overflow-y:auto; padding:10px; }
        .btn { padding:8px 14px; border-radius:20px; border:none; cursor:pointer; font-weight:600; font-size:0.85em; font-family: var(--font); background: transparent; border:2px solid var(--border); color: var(--text); white-space: nowrap; transition:0.2s; }
        .btn-primary { background: var(--accent); color:#fff; border-color: var(--accent); }
        .btn-sm { padding:5px 10px; font-size:0.75em; }
        .toast { position:fixed; top:15px; left:50%; transform:translateX(-50%); background: #3d3226; color:#fff; padding:10px 20px; border-radius:20px; z-index:999; opacity:0; transition:0.3s; font-size:0.9em; }
        .toast.show { opacity:1; }
        input, textarea, select { font-family: var(--font); border:1.5px solid var(--border); border-radius:8px; padding:8px; font-size:0.9em; width:100%; background: var(--surface); margin:4px 0; }
        .place-card { background: #fff; border:1px solid var(--border); border-radius: var(--radius); padding:8px; margin-bottom:6px; cursor:pointer; font-size:0.9em; }
        .place-card.high-freq { border-left:4px solid var(--gold); }
        .day-block { background: #fefaf5; border-radius: var(--radius); padding:10px; margin-bottom:8px; }
        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:200; display:flex; align-items:center; justify-content:center; }
        .modal { background:#fff; border-radius:var(--radius); padding:24px; max-width:400px; width:90%; max-height:80vh; overflow-y:auto; }
        .filter-btn.active { background: var(--accent); color:#fff; border-color: var(--accent); }
        .image-upload-area { border:2px dashed var(--border); border-radius:8px; padding:20px; text-align:center; cursor:pointer; background:#fafaf7; margin-top:4px; }
        .image-upload-area:hover { border-color: var(--accent); background:#fff7f2; }
        .preview-img { max-width:100%; max-height:150px; border-radius:6px; margin-top:8px; display:none; }
    </style>
</head>
<body>
<div class="toast" id="toast"></div>
<header class="app-header">
    <div style="font-size:1.4em; font-weight:700; color:var(--accent);">🧩 旅行拼图</div>
    <div style="display:flex; gap:6px; align-items:center; flex-wrap:wrap;">
        <button class="btn btn-sm" onclick="showAISettings()">🤖 豆包AI</button>
        <span id="roomCodeDisplay" style="background:#fefaf5; padding:5px 10px; border-radius:14px; font-weight:600; font-family:monospace; cursor:pointer;" onclick="copyShareCode()">—</span>
        <button class="btn btn-sm" onclick="showCreateModal()">✨ 创建</button>
        <button class="btn btn-sm" onclick="showJoinModal()">🔗 加入</button>
        <button class="btn btn-sm" onclick="exportRoom()">📤 导出</button>
        <button class="btn btn-sm" onclick="document.getElementById('importFile').click()">📥 导入</button>
        <button class="btn btn-sm" onclick="finishTrip()">✅ 存档</button>
        <button class="btn btn-sm" onclick="showArchiveModal()">📦 档案馆</button>
        <span id="destinationLabel" style="font-weight:600;"></span>
        <span id="countdownBadge" style="background:#fff0e8; padding:4px 8px; border-radius:10px; display:none;"></span>
        <span id="weatherBadge" style="background:#f0f4f8; padding:4px 8px; border-radius:10px; display:none;"></span>
    </div>
</header>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="importRoom(event)">

<div class="main-container">
    <div class="panel" id="panelLeft">
        <div class="panel-header">📝 内容收集</div>
        <div class="panel-body">
            <div style="display:flex; gap:6px; align-items:center;">
                <span>👤</span><strong id="currentUserLabel">我</strong>
                <button class="btn btn-sm" onclick="switchUser()">切换</button>
                <button class="btn btn-sm" onclick="addMember()">+成员</button>
            </div>
            <input type="text" id="userName" placeholder="你的名字" value="小明">
            <input type="text" id="userCity" placeholder="出发城市" value="北京">
            <div style="display:flex; gap:6px; align-items:center;">
                <button class="btn btn-sm" id="toggleModeBtn" onclick="toggleInputMode()" style="flex:1;">📷 截图模式</button>
            </div>
            <div id="textInputGroup"><textarea id="contentText" placeholder="粘贴攻略文字..." rows="4"></textarea></div>
            <div id="imageInputGroup" style="display:none;">
                <div class="image-upload-area" id="imageUploadArea" onclick="document.getElementById('imageInput').click()">📷 点击上传截图 或拖拽到此处</div>
                <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
                <img id="imagePreview" class="preview-img" alt="预览">
            </div>
            <button class="btn btn-primary" onclick="submitContent()" style="width:100%;">🤖 AI提取地点</button>
            <div id="extractStatus" style="font-size:0.8em; margin-top:4px;"></div>
            <div id="contentsList" style="margin-top:8px;"></div>
        </div>
    </div>
    <div class="panel" id="panelMid">
        <div class="panel-header">📍 地点聚合</div>
        <div class="panel-body">
            <div style="display:flex; gap:4px; margin-bottom:8px;">
                <button class="btn btn-sm filter-btn active" onclick="setFilter('all')">全部</button>
                <button class="btn btn-sm filter-btn" onclick="setFilter('restaurant')">🍽️ 餐厅</button>
                <button class="btn btn-sm filter-btn" onclick="setFilter('attraction')">🏛️ 景点</button>
                <button class="btn btn-sm filter-btn" onclick="setFilter('accommodation')">🏨 住宿</button>
            </div>
            <div id="highFreqSection" style="display:none;"><strong>🔥 高频推荐</strong><div id="highFreqList"></div></div>
            <div><strong>📋 全部地点</strong><div id="allPlacesList"></div></div>
        </div>
    </div>
    <div class="panel" id="panelRight">
        <div class="panel-header">🗓️ 行程 & 后记</div>
        <div class="panel-body">
            <div style="display:flex; gap:6px; align-items:center;">
                <label>日期</label><input type="date" id="startDate" onchange="updateCountdown()" style="width:auto;">
                <label>天数</label><select id="daysSelect" onchange="updateCountdown()" style="width:auto;">
                    <option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="generateItinerary()" style="width:100%;">✨ 生成行程</button>
            <div id="itineraryDisplay" style="margin-top:8px;"></div>
        </div>
    </div>
</div>
<div style="display:flex; gap:4px; justify-content:center; padding:6px; background:var(--surface);">
    <button class="btn btn-sm" onclick="document.getElementById('panelLeft').scrollIntoView({behavior:'smooth'})">📝 收集</button>
    <button class="btn btn-sm" onclick="document.getElementById('panelMid').scrollIntoView({behavior:'smooth'})">📍 地点</button>
    <button class="btn btn-sm" onclick="document.getElementById('panelRight').scrollIntoView({behavior:'smooth'})">🗓️ 行程</button>
</div>

<div class="modal-overlay" id="createModal" style="display:none;"><div class="modal"><h3>创建房间</h3><input id="roomName" placeholder="房间名称"><input id="destCity" placeholder="目的地城市（选填）"><button class="btn btn-primary" onclick="createRoom()">创建</button><button class="btn" onclick="closeModal('createModal')">取消</button></div></div>
<div class="modal-overlay" id="joinModal" style="display:none;"><div class="modal"><h3>加入房间</h3><input id="joinCode" placeholder="分享码"><button class="btn btn-primary" onclick="joinRoom()">加入</button><button class="btn" onclick="closeModal('joinModal')">取消</button></div></div>
<div class="modal-overlay" id="archiveModal" style="display:none;"><div class="modal"><h3>📦 档案馆</h3><div id="archiveList"></div><button class="btn" onclick="closeModal('archiveModal')">关闭</button></div></div>
<div class="modal-overlay" id="aiSettingsModal" style="display:none;"><div class="modal"><h3>🤖 豆包AI设置</h3><p style="font-size:0.8em;">API Key 已预置，请填写模型接入点 ID</p><input id="aiModel" placeholder="推理接入点ID (如 ep-2024xxxxxxxx)"><button class="btn btn-primary" onclick="saveAISettings()">保存</button><button class="btn" onclick="closeModal('aiSettingsModal')">取消</button></div></div>

<script>
// ========== 预置豆包配置（API Key 已写入，别人打开就能用） ==========
const BUILTIN_AI = {
    apiKey: 'ark-4ffb0e3e-50a8-41d2-9382-1dfe52ebbbfb-c594b',
    baseUrl: 'https://ark.cn-beijing.volces.com/api/v3',
    model: ''
};

// 全局状态
let appData = {
    activeRoomCode: null,
    activeUserId: 'user_1',
    users: { 'user_1': { name:'小明', city:'北京' } },
    nextUserId: 2,
    rooms: {},
    archives: {},
    ai: { ...BUILTIN_AI }
};
let currentFilter = 'all';
let inputMode = 'text';

// 持久化
function loadAll() {
    const saved = localStorage.getItem('trip_puzzle');
    if (saved) { try { appData = { ...appData, ...JSON.parse(saved) }; } catch(e) {} }
    const code = new URLSearchParams(window.location.search).get('code');
    if (code && appData.rooms[code]) appData.activeRoomCode = code;
    const ai = localStorage.getItem('trip_ai');
    if (ai) { try { appData.ai = { ...BUILTIN_AI, ...JSON.parse(ai) }; } catch(e) {} }
}
function saveLocal() { localStorage.setItem('trip_puzzle', JSON.stringify(appData)); }
function saveAi() { localStorage.setItem('trip_ai', JSON.stringify(appData.ai)); }

// ========== 房间操作 ==========
function createRoom() {
    const name = document.getElementById('roomName').value.trim();
    if (!name) return toast('请输入房间名称');
    const dest = document.getElementById('destCity').value.trim();
    const code = Math.random().toString(36).substring(2,8).toUpperCase();
    const room = { shareCode: code, name, destination: dest || '', startDate:'', days:2, contents:[], itinerary:[], memberCities: { [appData.activeUserId]: getUser().city || '北京' } };
    appData.rooms[code] = room;
    appData.activeRoomCode = code;
    saveLocal();
    closeModal('createModal');
    refreshAll();
    toast('房间创建成功！分享码：'+code);
}
function joinRoom() {
    const code = document.getElementById('joinCode').value.trim().toUpperCase();
    if (!appData.rooms[code]) return toast('房间不存在，请先由对方导出文件发给你');
    appData.activeRoomCode = code;
    saveLocal();
    closeModal('joinModal');
    refreshAll();
    toast('已加入房间');
}
function finishTrip() {
    const room = getRoom(); if (!room) return;
    room.completed = true;
    appData.archives[room.shareCode] = JSON.parse(JSON.stringify(room));
    delete appData.rooms[room.shareCode];
    appData.activeRoomCode = null;
    saveLocal();
    refreshAll();
    toast('旅行已存档');
}
function getRoom() { return appData.activeRoomCode ? appData.rooms[appData.activeRoomCode] : null; }
function getUser() { return appData.users[appData.activeUserId]; }

// ========== 成员管理 ==========
function switchUser() {
    const ids = Object.keys(appData.users);
    const cur = ids.indexOf(appData.activeUserId);
    appData.activeUserId = ids[(cur+1)%ids.length];
    refreshAll();
}
function addMember() {
    const name = document.getElementById('userName').value.trim() || '成员'+appData.nextUserId;
    const city = document.getElementById('userCity').value.trim() || '未知';
    const id = 'user_'+appData.nextUserId++;
    appData.users[id] = { name, city };
    appData.activeUserId = id;
    const room = getRoom();
    if (room) { room.memberCities[id] = city; saveLocal(); }
    refreshAll(); toast('已添加'+name);
}

// ========== 截图切换 ==========
function toggleInputMode() {
    const btn = document.getElementById('toggleModeBtn');
    if (inputMode === 'text') {
        inputMode = 'image';
        document.getElementById('textInputGroup').style.display = 'none';
        document.getElementById('imageInputGroup').style.display = 'block';
        btn.textContent = '📝 文字模式';
    } else {
        inputMode = 'text';
        document.getElementById('textInputGroup').style.display = 'block';
        document.getElementById('imageInputGroup').style.display = 'none';
        btn.textContent = '📷 截图模式';
        document.getElementById('imagePreview').style.display = 'none';
        document.getElementById('imageInput').value = '';
    }
}
function handleImageUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => { const img = document.getElementById('imagePreview'); img.src = ev.target.result; img.style.display = 'block'; };
    reader.readAsDataURL(file);
}

// ========== AI 提取（豆包/OpenAI兼容） ==========
async function extractWithAI(text) {
    const { apiKey, baseUrl, model } = appData.ai;
    if (!apiKey || !baseUrl) return null; // 没有密钥就不调用

    const requestBody = {
        messages: [{
            role: 'user',
            content: `你是一个旅行攻略提取助手。请从以下文本中提取所有提到的餐厅、景点和住宿，并以 JSON 数组形式返回，每个对象包含 name (地点名称)、type (类型：restaurant/attraction/accommodation)、reason (简短推荐理由)。\n\n要求：只输出 JSON 数组，不要任何解释、标记或额外文字。\n\n文本：${text}`
        }],
        temperature: 0.1,
        max_tokens: 1024
    };
    // 如果用户填写了 model 就传，否则不传（很多服务不强制需要）
    if (model) requestBody.model = model;

    try {
        const resp = await fetch(`${baseUrl.replace(/\/+$/, '')}/chat/completions`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify(requestBody)
        });
        const data = await resp.json();
        if (!data.choices || !data.choices[0]?.message?.content) {
            throw new Error('API 返回格式异常');
        }
        let content = data.choices[0].message.content.trim();

        // 尝试多种方式提取 JSON
        let places = null;
        // 方式1：直接匹配 [...]
        const arrayMatch = content.match(/\[[\s\S]*?\]/);
        if (arrayMatch) {
            try { places = JSON.parse(arrayMatch[0]); } catch(e) {}
        }
        // 方式2：如果方式1失败，尝试匹配 {...} 并包装成数组
        if (!places) {
            const objMatch = content.match(/\{[\s\S]*?\}/g);
            if (objMatch) {
                try { places = objMatch.map(s => JSON.parse(s)); } catch(e) {}
            }
        }
        // 方式3：尝试将整个内容当作 JSON 解析
        if (!places) {
            try { places = JSON.parse(content); if (!Array.isArray(places)) places = [places]; } catch(e) {}
        }
        // 如果仍然无法解析，返回错误信息
        if (!places) {
            throw new Error('无法从 AI 回复中提取地点，请检查模型设置或重试');
        }
        return places;
    } catch (e) {
        console.error('AI 提取失败：', e);
        // 返回 null 触发模拟提取，但我们可以在这里直接提示
        document.getElementById('extractStatus').textContent = '❌ AI 调用失败：' + e.message;
        return null;
    }
}
function simulateExtract(text) {
    const known = [
        { kw:['故宫'], name:'故宫', type:'attraction', reason:'历史文化地标' },
        { kw:['烤鸭','四季民福'], name:'四季民福烤鸭店', type:'restaurant', reason:'烤鸭名店' },
        { kw:['花间堂'], name:'花间堂酒店', type:'accommodation', reason:'特色酒店' },
        { kw:['长城','八达岭'], name:'八达岭长城', type:'attraction', reason:'世界遗产' },
        { kw:['南锣鼓巷'], name:'南锣鼓巷', type:'attraction', reason:'胡同文化' },
    ];
    return known.filter(p => p.kw.some(w => text.includes(w))).map(p => ({name:p.name, type:p.type, reason:p.reason}));
}
async function submitContent() {
    const room = getRoom(); if (!room) return toast('请先创建或加入房间');
    const user = getUser();
    user.name = document.getElementById('userName').value.trim() || user.name;
    user.city = document.getElementById('userCity').value.trim() || user.city;
    if (!room.memberCities) room.memberCities = {};
    room.memberCities[appData.activeUserId] = user.city;

    let rawText = '';
    if (inputMode === 'text') {
        rawText = document.getElementById('contentText').value.trim();
        if (!rawText) return toast('请粘贴攻略文字');
    } else {
        const preview = document.getElementById('imagePreview');
        if (!preview.src || preview.style.display === 'none') return toast('请上传截图');
        rawText = '[截图内容]';
    }

    document.getElementById('extractStatus').textContent = '🤖 AI 分析中...';
    let places = await extractWithAI(rawText);
    if (!places) places = simulateExtract(rawText);
    room.contents.push({
        id: Date.now().toString(), userId: appData.activeUserId,
        userName: user.name, text: rawText.substring(0,200),
        places, time: new Date().toISOString()
    });
    if (inputMode === 'text') document.getElementById('contentText').value = '';
    else { document.getElementById('imagePreview').style.display = 'none'; document.getElementById('imageInput').value = ''; }
    saveLocal();
    refreshAll();
    document.getElementById('extractStatus').textContent = `✅ 提取到 ${places.length} 个地点`;
    setTimeout(() => document.getElementById('extractStatus').textContent = '', 3000);
}

// ========== 地点聚合 ==========
function aggregatePlaces() {
    const room = getRoom(); if (!room) return { highFreq:[], all:[] };
    const stats = {};
    room.contents.forEach(c => c.places.forEach(p => {
        const key = p.name;
        if (!stats[key]) stats[key] = { ...p, count:0, users:[] };
        stats[key].count++;
        if (!stats[key].users.includes(c.userName)) stats[key].users.push(c.userName);
    }));
    const all = Object.values(stats).sort((a,b) => b.count - a.count);
    return { highFreq: all.filter(p => p.count>=2), all };
}
function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.filter-btn[onclick="setFilter('${f}')"]`).classList.add('active');
    renderMiddle();
}
function togglePlaceSelect(name) {
    const room = getRoom(); if (!room) return;
    if (!room._selected) room._selected = [];
    const idx = room._selected.indexOf(name);
    if (idx >= 0) room._selected.splice(idx,1); else room._selected.push(name);
    saveLocal();
    renderMiddle(); renderRight();
}
function generateItinerary() {
    const room = getRoom(); if (!room) return;
    const selected = room._selected || [];
    if (!selected.length) return toast('请先点击地点加入行程');
    const { all } = aggregatePlaces();
    const chosen = all.filter(p => selected.includes(p.name));
    const days = parseInt(document.getElementById('daysSelect').value) || 2;
    room.days = days;
    room.startDate = document.getElementById('startDate').value;
    const itinerary = [];
    for (let d=0; d<days; d++) itinerary.push({ day:d+1, places:[] });
    chosen.forEach((p, i) => itinerary[i%days].places.push(p));
    room.itinerary = itinerary;
    saveLocal();
    refreshAll();
}

// ========== 天气（安全版） ==========
async function updateWeather() {
    const room = getRoom();
    const badge = document.getElementById('weatherBadge');
    if (!room || !room.destination) { badge.style.display='none'; return; }
    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 5000);
        const resp = await fetch(`https://wttr.in/${encodeURIComponent(room.destination)}?format=4`, { signal: controller.signal });
        clearTimeout(timeout);
        if (!resp.ok) throw new Error('fetch failed');
        let text = await resp.text();
        if (text.includes('<')) {
            const div = document.createElement('div'); div.innerHTML = text;
            text = (div.textContent || div.innerText || '').replace(/\s+/g, ' ').trim();
        } else text = text.replace(/^[:\s]+/, '').trim();
        if (text.length > 60) text = text.substring(0,57)+'...';
        badge.textContent = text;
        badge.style.display = 'inline-block';
    } catch(e) { badge.style.display='none'; }
}
function updateCountdown() {
    const room = getRoom(); if (!room) return;
    room.startDate = document.getElementById('startDate').value;
    room.days = parseInt(document.getElementById('daysSelect').value);
    saveLocal();
    refreshAll();
}

// ========== 导出/导入协作 ==========
function exportRoom() {
    const room = getRoom(); if (!room) return toast('没有打开的房间');
    const blob = new Blob([JSON.stringify(room, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `旅行拼图_${room.shareCode}.json`;
    a.click();
    toast('已导出，发送给朋友吧');
}
function importRoom(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        try {
            const room = JSON.parse(ev.target.result);
            if (!room.shareCode) throw new Error('无效文件');
            appData.rooms[room.shareCode] = room;
            appData.activeRoomCode = room.shareCode;
            saveLocal(); refreshAll(); toast('房间导入成功');
        } catch(ex) { toast('无效的房间文件'); }
    };
    reader.readAsText(file);
    e.target.value = '';
}

// ========== 弹窗辅助 ==========
function showCreateModal() { document.getElementById('createModal').style.display='flex'; }
function showJoinModal() { document.getElementById('joinModal').style.display='flex'; }
function showArchiveModal() {
    const list = document.getElementById('archiveList');
    list.innerHTML = Object.values(appData.archives).length
        ? Object.values(appData.archives).map(r => `<div style="margin-bottom:6px;"><b>${r.name}</b> (${r.shareCode}) <button class="btn btn-sm" onclick="loadArchive('${r.shareCode}')">查看</button></div>`).join('')
        : '<p>暂无存档</p>';
    document.getElementById('archiveModal').style.display='flex';
}
function loadArchive(code) {
    const room = appData.archives[code];
    if (room) { appData.activeRoomCode = code; appData.rooms[code] = room; closeModal('archiveModal'); refreshAll(); toast('查看存档：'+room.name); }
}
function showAISettings() {
    document.getElementById('aiModel').value = appData.ai.model;
    document.getElementById('aiSettingsModal').style.display='flex';
}
function saveAISettings() {
    appData.ai.model = document.getElementById('aiModel').value.trim();
    saveAi();
    closeModal('aiSettingsModal');
    toast(appData.ai.model ? '豆包AI已配置，提取时将使用模型' : '已保存（请填写模型接入点ID）');
}
function closeModal(id) { document.getElementById(id).style.display='none'; }
function copyShareCode() { const room = getRoom(); if (room) navigator.clipboard.writeText(room.shareCode).then(() => toast('分享码已复制')); }

// ========== 渲染 ==========
function refreshAll() { renderHeader(); renderLeft(); renderMiddle(); renderRight(); updateWeather(); }
function renderHeader() {
    const room = getRoom();
    document.getElementById('roomCodeDisplay').textContent = room ? room.shareCode : '—';
    document.getElementById('destinationLabel').textContent = room?.destination ? '🎯 '+room.destination : '';
    const cd = document.getElementById('countdownBadge');
    if (room?.startDate) {
        const diff = Math.ceil((new Date(room.startDate) - new Date())/(86400000));
        cd.textContent = diff>0 ? `⏳ ${diff}天` : '🎉 出发!';
        cd.style.display = 'inline-block';
    } else cd.style.display = 'none';
    document.getElementById('startDate').value = room?.startDate || '';
    document.getElementById('daysSelect').value = room?.days || 2;
}
function renderLeft() {
    const room = getRoom();
    document.getElementById('currentUserLabel').textContent = getUser().name;
    document.getElementById('userName').value = getUser().name;
    document.getElementById('userCity').value = getUser().city||'';
    const list = document.getElementById('contentsList');
    if (!room?.contents.length) { list.innerHTML = '<div style="color:gray;text-align:center;">还没有内容</div>'; return; }
    list.innerHTML = room.contents.map(c => `
        <div style="background:#fff; border-radius:8px; padding:8px; margin-bottom:6px;">
            <div style="font-size:0.8em; color:gray;">${c.userName}</div>
            <div>${c.text}</div>
            <div style="display:flex; gap:4px; flex-wrap:wrap;">${c.places.map(p => `<span style="background:#f0ebe0; padding:2px 6px; border-radius:6px; font-size:0.7em;">${p.name}</span>`).join('')}</div>
        </div>
    `).join('');
}
function renderMiddle() {
    const { highFreq, all } = aggregatePlaces();
    const filtered = currentFilter==='all'?all:all.filter(p=>p.type===currentFilter);
    const highF = currentFilter==='all'?highFreq:highFreq.filter(p=>p.type===currentFilter);
    document.getElementById('highFreqSection').style.display = highF.length?'block':'none';
    document.getElementById('highFreqList').innerHTML = highF.map(p => `
        <div class="place-card high-freq" onclick="togglePlaceSelect('${p.name}')">
            <strong>${p.name}</strong> <span style="color:var(--gold);">🔥${p.count}</span>
            <div style="font-size:0.7em;">${p.users.join('、')}</div>
        </div>
    `).join('');
    const normal = filtered.filter(p=>!highF.includes(p));
    document.getElementById('allPlacesList').innerHTML = normal.map(p => `
        <div class="place-card" onclick="togglePlaceSelect('${p.name}')">
            <strong>${p.name}</strong> <span style="color:gray;">${p.count}次</span>
        </div>
    `).join('');
}
function renderRight() {
    const room = getRoom();
    const container = document.getElementById('itineraryDisplay');
    if (!room?.itinerary) { container.innerHTML = '<div style="color:gray;text-align:center;">点击地点加入行程后生成</div>'; return; }
    container.innerHTML = room.itinerary.map(day => `
        <div class="day-block"><strong>第${day.day}天</strong>${day.places.map(p => `<div>· ${p.name} (${p.type})</div>`).join('')}</div>
    `).join('');
}
function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

// 拖拽上传
document.addEventListener('DOMContentLoaded', () => {
    const upload = document.getElementById('imageUploadArea');
    if (upload) {
        upload.addEventListener('dragover', e => { e.preventDefault(); upload.style.borderColor='var(--accent)'; });
        upload.addEventListener('dragleave', () => upload.style.borderColor='var(--border)');
        upload.addEventListener('drop', e => {
            e.preventDefault(); upload.style.borderColor='var(--border)';
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                document.getElementById('imageInput').files = e.dataTransfer.files;
                handleImageUpload({ target: { files: [file] } });
            }
        });
    }
});

// 启动
loadAll();
if (appData.activeRoomCode && appData.rooms[appData.activeRoomCode]) {
    refreshAll();
} else {
    refreshAll();
    toast('点击✨创建开始规划旅行');
}
</script>
</body>
</html>
